<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img">
  <title>BunniRocks mark, reversed</title>
  <desc>Light version of the rabbit-and-test-tube mark for dark backgrounds, the face watermarked with the repeating phrase Laboratory Compliance Consultant.</desc>

  <defs>
    <pattern id="brWatermarkR" width="122" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(-20)">
      <text xml:space="preserve" x="0" y="9" textLength="122" lengthAdjust="spacingAndGlyphs" font-family="Nunito, 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#0D5C63">Laboratory Compliance Consultant </text>
      <text xml:space="preserve" x="-61" y="22" textLength="122" lengthAdjust="spacingAndGlyphs" font-family="Nunito, 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#0D5C63">Laboratory Compliance Consultant </text>
      <text xml:space="preserve" x="61" y="22" textLength="122" lengthAdjust="spacingAndGlyphs" font-family="Nunito, 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#0D5C63">Laboratory Compliance Consultant </text>
    </pattern>
    <clipPath id="brHeadClipR">
      <ellipse cx="100" cy="130" rx="48" ry="44"/>
    </clipPath>
  </defs>

  <ellipse cx="100" cy="130" rx="48" ry="44" fill="#FFFFFF"/>
  <rect x="50" y="84" width="100" height="92" fill="url(#brWatermarkR)" opacity="0.45" clip-path="url(#brHeadClipR)"/>

  <g transform="translate(84,20) rotate(-14 0 78)">
    <path d="M -13 38 L -13 65 A 13 13 0 0 0 13 65 L 13 38 Z" fill="#E63946"/>
    <rect x="-13" y="0" width="26" height="78" rx="13" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  </g>

  <g transform="translate(116,20) rotate(14 0 78)">
    <path d="M -13 38 L -13 65 A 13 13 0 0 0 13 65 L 13 38 Z" fill="#E63946"/>
    <rect x="-13" y="0" width="26" height="78" rx="13" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  </g>

  <circle cx="82" cy="132" r="5.5" fill="#0D5C63"/>
  <circle cx="118" cy="132" r="5.5" fill="#0D5C63"/>
  <path d="M 100 140 C 100 140 107.5 149.5 107.5 152 A 7.5 7.5 0 1 1 92.5 152 C 92.5 149.5 100 140 100 140 Z" fill="#E63946"/>
</svg>
